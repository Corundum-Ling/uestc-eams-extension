<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAMS 优化版</title>
  <style>
    :root {
      --primary: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 280px;
      padding: 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 15px; color: var(--primary); }
    .header p { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

    .menu { display: flex; flex-direction: column; gap: 6px; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--card);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      transition: all 0.15s;
      cursor: pointer;
    }
    .menu-item:hover { border-color: var(--primary); }
    .menu-item .icon { font-size: 18px; }
    .menu-item .title { font-size: 13px; font-weight: 500; }
    .menu-item .desc { font-size: 11px; color: var(--text-secondary); }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer a { color: var(--primary); text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 EAMS 优化版</h1>
    <p id="status">检测中...</p>
  </div>

  <div class="menu">
    <a href="#" class="menu-item" data-page="dashboard">
      <span class="icon">🏠</span>
      <div><div class="title">打开主页</div><div class="desc">课表、成绩、考试入口</div></div>
    </a>
    <a href="#" class="menu-item" data-page="schedule">
      <span class="icon">📅</span>
      <div><div class="title">我的课表</div><div class="desc">查看本周课程安排</div></div>
    </a>
    <a href="#" class="menu-item" data-page="grades">
      <span class="icon">📊</span>
      <div><div class="title">我的成绩</div><div class="desc">查看成绩和 GPA</div></div>
    </a>
    <a href="#" class="menu-item" data-page="exams">
      <span class="icon">📋</span>
      <div><div class="title">我的考试</div><div class="desc">查看考试安排</div></div>
    </a>
  </div>

  <div class="footer">
    <a href="https://eams.uestc.edu.cn/eams/home!submenus.action?menu.id=" target="_blank">访问原 EAMS 系统 →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
